# wokelangiser manifest for civic-connect

[project]
name = "civic-connect"

[consent]
gdpr = true
ccpa = true
default-state = "opt-out"
categories = ["functional", "analytics", "third-party"]

[accessibility]
wcag-level = "AAA"
check-contrast = true
check-alt-text = true
check-aria = true
min-contrast-ratio = 7.0

[i18n]
default-locale = "en-GB"
supported-locales = ["en-GB", "fr-FR", "de-DE", "cy-GB", "ga-IE"]
extract-strings = true

[report]
format = "text"
