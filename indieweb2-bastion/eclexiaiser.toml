# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: PMPL-1.0-or-later

[project]
name = "indieweb2-bastion"

[[functions]]
name = "validateAll"
source = "src/PolicyGate.res"
energy-budget-mj = 20.0
carbon-budget-mg = 4.0

[[functions]]
name = "validateCryptoCompliance"
source = "src/PolicyGate.res"
energy-budget-mj = 15.0
carbon-budget-mg = 3.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
