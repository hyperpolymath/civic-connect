#
# k9iser manifest for civic-connect
# Generates K9 contracts from repo configuration files.
# civic-connect is a civic technology platform with IndieWeb2 bastion and civic-stream components

[project]
name = "civic-connect"
safety_tier = "yard"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[source]]
path = ".github/workflows/hypatia-scan.yml"
type = "workflow"
output = "generated/k9iser/ci-security.k9"

[[source]]
path = ".github/workflows/codeql.yml"
type = "workflow"
output = "generated/k9iser/ci-codeql.k9"

[[constraint]]
rule = "workflows includes hypatia-scan"
severity = "error"

[[constraint]]
rule = "services.app.environment contains 'VERISIMDB_URL'"
severity = "warn"

[[constraint]]
rule = "abi.definitions exist in src/abi/ when ffi/ is present"
severity = "warn"
